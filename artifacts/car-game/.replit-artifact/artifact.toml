kind = "web"
previewPath = "/"
title = "3D Car Driving Game"
version = "1.0.0"
id = "artifacts/car-game"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25726

[services.development]
run = "pnpm --filter @workspace/car-game run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/car-game", "run", "build" ]
publicDir = "artifacts/car-game/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25726"
BASE_PATH = "/"
